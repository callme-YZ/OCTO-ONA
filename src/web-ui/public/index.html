<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCTO-ONA Configuration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container">
    <header>
      <h1>🔍 OCTO-ONA Configuration</h1>
      <p>Configure your Organizational Network Analysis in 4 easy steps</p>
    </header>
    
    <div class="content">
      
      <!-- Step 1: Data Source -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">1</span>
          Select Data Source
        </div>
        
        <div class="form-group">
          <label for="adapterType">Platform</label>
          <select id="adapterType">
            <option value="discord">Discord (API)</option>
            <option value="github">GitHub (GraphQL)</option>
          </select>
        </div>
        
        <!-- Discord Config -->
        <div id="discord-config" class="hidden">
          <div class="form-group">
            <label for="discord-token">Bot Token</label>
            <input type="password" id="discord-token" placeholder="Your Discord Bot Token">
          </div>
          <div class="form-group">
            <label for="discord-guild">Guild ID</label>
            <input type="text" id="discord-guild" placeholder="1234567890">
          </div>
        </div>
        
        <!-- GitHub Config -->
        <div id="github-config" class="hidden">
          <div class="form-group">
            <label for="github-token">Personal Access Token</label>
            <input type="password" id="github-token" placeholder="ghp_xxxxx">
          </div>
          <div class="form-group">
            <label for="github-owner">Repository Owner</label>
            <input type="text" id="github-owner" placeholder="facebook">
          </div>
          <div class="form-group">
            <label for="github-repo">Repository Name</label>
            <input type="text" id="github-repo" placeholder="react">
          </div>
        </div>
        
        <button id="test-connection">Test Connection</button>
        <div id="connection-status"></div>
      </div>
      
      <!-- Step 2: Filters -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">2</span>
          Configure Filters
        </div>
        
        <div class="form-group">
          <label for="start-date">Start Date</label>
          <input type="date" id="start-date">
        </div>
        
        <div class="form-group">
          <label for="end-date">End Date</label>
          <input type="date" id="end-date">
        </div>
        
        <button id="preview-btn">🔍 Preview Network</button>
        <div id="preview-status"></div>
      </div>
      
      <!-- Step 3: Run Analysis -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">3</span>
          Run Analysis
        </div>
        
        <button id="run-analysis">🚀 Run Analysis</button>
        <div id="run-status"></div>
      </div>
      
    </div>
  </div>
  
  <script src="app.js"></script>
  
</body>
</html>
